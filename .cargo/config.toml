[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
# Newer nightlies (>=2025) gate custom JSON target specs behind this flag.
json-target-spec = true

[build]
target = "x86_64-jos.json"

# build a grub multiboot2 iso around the kernel elf and boot it headless under
# qemu. qemu's built-in -kernel loader is multiboot1-only and rejects our elf64,
# so grub does the loading. the script also maps the isa-debug-exit success code
# back to shell exit 0 for `cargo test`. cargo appends the elf path as $1.
[target.'cfg(target_os = "none")']
runner = "scripts/run-qemu.sh"

# cargo build --target aarch64-jos.json
# cargo run --target aarch64-jos.json
[target.aarch64-unknown-none]
runner = "qemu-system-aarch64 -machine virt -cpu cortex-a57 -nographic -bios /usr/local/share/qemu/aarch64-efi-symlink.bin -kernel"

